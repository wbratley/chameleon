server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name relay.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/relay.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location /ws {
        proxy_pass          http://127.0.0.1:8080;
        proxy_http_version  1.1;
        # These hop-by-hop headers must be forwarded explicitly — nginx strips them by default
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        # Default 60s timeout kills idle WebSocket connections; heartbeat=30 prevents
        # the connection appearing idle but this is belt-and-suspenders
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8080;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name relay.yourdomain.com;
    return 301 https://$host$request_uri;
}
